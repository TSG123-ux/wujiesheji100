<!DOCTYPE html>
<html>
<head>
    <title>清除本地存储</title>
</head>
<body>
    <h1>清除本地存储</h1>
    <button onclick="clearStorage()">清除所有数据</button>
    <p id="message"></p>

    <script>
        function clearStorage() {
            localStorage.clear();
            document.getElementById('message').textContent = '本地存储已清除！';
            setTimeout(() => {
                window.close();
            }, 1000);
        }
    </script>
</body>
</html>
